# Enhanced CI Pipeline - Security, Quality & Engineering Gates (2025-2026 standards)
# Compliant with ADR-001: Security & CI Enhancement
# Includes: Secret scanning, Dependency audit, stricter quality gates

name: CI - Security + Quality + Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Secret Scanning (GitHub + custom)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

      - name: NPM Audit (Security)
        run: npm audit --audit-level=high --production
        continue-on-error: false

  verify:
    needs: security
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role
      BV103_COMPLIANCE_MULTI_V2: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      
      - name: Guard Legacy Table Names
        run: node scripts/guard-legacy-table-names.mjs
      
      - name: Lint (ESLint + CSSD Architecture)
        run: npm run lint && npm run lint:cssd-architecture
      
      - name: Test (CSSD + Pilot)
        run: npm run test:cssd && npm run test:pilot
      
      - name: Engineering Contract Verify
        run: npm run verify:engineering
      
      - name: Production Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: verify
    env:
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
