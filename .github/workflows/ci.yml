# Enhanced CI Pipeline - Security, Quality & Engineering Gates (2025-2026 standards)
# Compliant with ADR-001: Security & CI Enhancement + Test Coverage Gate

name: CI - Security + Quality + Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Secret Scanning (GitHub + custom)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: NPM Audit (Security)
        run: npm audit --audit-level=high --production
        continue-on-error: true

  verify:
    # Quality gate must not be blocked by npm audit (xlsx/postcss); see job `security`.
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      
      - name: Guard Legacy Table Names
        run: node scripts/guard-legacy-table-names.mjs

      - name: Docs links check
        run: npm run docs:links:check

      - name: Layout drift check
        run: npm run layout:drift-check
      
      - name: Lint (ESLint + CSSD Architecture)
        run: npm run lint && npm run lint:cssd-architecture

      - name: CSSD module verify
        run: npm run verify:cssd
      
      - name: Test with Coverage (≥80%)
        run: npm run test:coverage
      
      - name: Engineering Contract Verify
        run: npm run verify:engineering
      
      - name: Production Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: verify
    env:
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
