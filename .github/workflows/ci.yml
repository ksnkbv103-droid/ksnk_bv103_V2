# Gate: ESLint (full + CSSD architecture) + Vitest + engineering contract + production build.
# E2E Playwright: chạy khi có secrets E2E_USER_* (optional job).
# MDM post-migration: `npm run verify:mdm:post-migration` (local/linked, không trên PR mặc định).
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role
      BV103_COMPLIANCE_MULTI_V2: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node scripts/guard-legacy-table-names.mjs
      - run: npm run lint
      - run: npm run lint:cssd-architecture
      - run: npm run test:cssd
      - run: npm run test:pilot
      - run: npm run verify:engineering
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
